name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  php-tests:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: humana_testing
      DB_USERNAME: root
      DB_PASSWORD: ""
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: humana_testing
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_ROOT_PASSWORD: ""
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare testing environment
        run: |
          cp .env.testing .env
          php artisan config:clear

      - name: Run database migrations and seeders
        run: php artisan migrate:fresh --seed --force

      - name: Run test suite
        run: php artisan test